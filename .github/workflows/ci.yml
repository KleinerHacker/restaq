name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile
        run: ./gradlew classes testClasses

      - name: Test
        run: ./gradlew test

  licence:
    name: Licence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check
        run: ./gradlew licensee

      - name: Report
        run: ./gradlew generateLicenseReport

      - name: Upload licence report
        uses: actions/upload-artifact@v4
        with:
          name: licence-report
          path: build/licences/

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    needs: licence
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download licence report
        uses: actions/download-artifact@v4
        with:
          name: licence-report
          path: docs/docs/licences/

      - name: Build
        run: ./gradlew buildDocs
