name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build -x test --stacktrace --info

      - name: Run tests
        run: ./gradlew test --stacktrace --info

  licence:
    name: Licence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Check licences
        run: ./gradlew licensee --stacktrace --info

      - name: Report
        run: ./gradlew generateLicenseReport --stacktrace --info

      - name: Upload licence report
        uses: actions/upload-artifact@v4
        with:
          name: licence-report
          path: build/licences/

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    needs: licence
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download licence report
        uses: actions/download-artifact@v4
        with:
          name: licence-report
          path: docs/docs/licences/

      - name: Build
        run: ./gradlew buildDocs --stacktrace --info
