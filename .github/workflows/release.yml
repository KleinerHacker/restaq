name: Release

on:
  push:
    tags: [ "**" ]

permissions:
  contents: write
  pages: write

jobs:
  pre-check:
    name: Pre-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify changelog entry exists
        run: |
          TAG="${{ github.ref_name }}"
          if ! grep -q "^# \[$TAG\]" CHANGELOG.md; then
            echo "::error::No changelog entry found for tag '$TAG'. Expected a section '# [$TAG]' in CHANGELOG.md."
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: pre-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build -x test --stacktrace --info

      - name: Run tests
        run: ./gradlew test --stacktrace --info

  licence:
    name: Licence
    runs-on: ubuntu-latest
    needs: pre-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Check
        run: ./gradlew licensee --stacktrace --info

      - name: Report
        run: ./gradlew generateLicenseReport --stacktrace --info

      - name: Upload licence report
        uses: actions/upload-artifact@v4
        with:
          name: licence-report
          path: build/licences/

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    needs: licence
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download licence report
        uses: actions/download-artifact@v4
        with:
          name: licence-report
          path: docs/docs/licences/

      - name: Build
        run: ./gradlew buildDocs --stacktrace --info

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy
        run: ./gradlew deployDocs -Pversion=${{ github.ref_name }} --stacktrace --info

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ build, licence, documentation ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine pre-release
        id: meta
        run: |
          TAG="${{ github.ref_name }}"
          # Pre-release if tag starts with '0.' or with a letter
          if [[ "$TAG" =~ ^0\. ]] || [[ "$TAG" =~ ^[a-zA-Z] ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          # Extract the section for this tag from CHANGELOG.md
          # Matches from "# [$TAG]" until the next "# [" header or end of file
          NOTES=$(sed -n "/^# \[$TAG\]/,/^# \[/{/^# \[$TAG\]/d;/^# \[/d;p}" CHANGELOG.md)
          # Write to output using delimiter to handle multiline
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
