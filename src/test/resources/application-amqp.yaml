# Demo configuration for the AMQP/RabbitMQ profile. Values are placeholders and
# will be corrected later.
spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

restqa:
  type: amqp
  sender:
    orders:
      rest:
        path: /api/orders
      queue:
        name: orders.queue
        exchange: orders.exchange
        routingKey: orders.created
  receiver:
    notifications:
      rest:
        url: https://downstream.example.com/notify
      queue:
        name: notifications.queue
