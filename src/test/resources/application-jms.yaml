# Demo configuration for the JMS/Artemis profile. Values are placeholders and
# will be corrected later.
spring:
  artemis:
    mode: native
    broker-url: tcp://localhost:61616
    user: artemis
    password: artemis

restqa:
  type: jms
  sender:
    orders:
      rest:
        path: /api/orders
      queue:
        name: orders.queue
  receiver:
    notifications:
      rest:
        url: https://downstream.example.com/notify
      queue:
        name: notifications.queue
